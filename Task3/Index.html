<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">
    <h2> Calculator</h2>

    <input type="text" id="display" readonly>

    <div class="buttons">
        <button class="btn1" onclick="appendValue('7')">7</button>
        <button class="btn2" onclick="appendValue('8')">8</button>
        <button class="btn3" onclick="appendValue('9')">9</button>
        <button class="btn4" onclick="appendValue('/')">÷</button>

        <button class="btn5" onclick="appendValue('4')">4</button>
        <button class="btn6" onclick="appendValue('5')">5</button>
        <button class="btn7" onclick="appendValue('6')">6</button>
        <button class="btn8" onclick="appendValue('*')">×</button>

        <button class="btn9" onclick="appendValue('1')">1</button>
        <button class="btn10" onclick="appendValue('2')">2</button>
        <button class="btn11" onclick="appendValue('3')">3</button>
        <button class="btn12" onclick="appendValue('-')">−</button>

        <button class="btn13" onclick="appendValue('0')">0</button>
        <button class="btn14" onclick="appendValue('.')">.</button>
        <button class="btn15" onclick="calculate()">=</button>
        <button class="btn16" onclick="appendValue('+')">+</button>

        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="historyBtn" onclick="showHistory()">History</button>
        <button class="clearHistory" onclick="clearHistory()">Clear H</button>
        <button class="backspace" onclick="backspace()">⌫</button>
    </div>

    <div class="history-box" id="history">
        <h3>Calculation History</h3>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
